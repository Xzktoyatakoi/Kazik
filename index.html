<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ракетка</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0d1a;
            color: #fff;
            padding: 12px;
            min-height: 100vh;
        }
        .app {
            max-width: 420px;
            margin: 0 auto;
        }
        /* Хедер */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0 12px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: #0a0d1a;
        }
        .username {
            font-weight: 700;
            font-size: 18px;
        }
        .user-id {
            font-size: 12px;
            color: #64748b;
        }
        .balance-box {
            background: rgba(255,255,255,0.06);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            color: #fbbf24;
            font-weight: 600;
        }

        /* Дисплей */
        .rocket-display {
            text-align: center;
            padding: 16px 0 8px;
            background: rgba(255,255,255,0.02);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.04);
            margin-bottom: 12px;
        }
        .multiplier {
            font-size: 52px;
            font-weight: 800;
            color: #fbbf24;
            text-shadow: 0 0 40px rgba(251,191,36,0.15);
            letter-spacing: -1px;
        }
        .multiplier-label {
            font-size: 12px;
            color: #64748b;
            letter-spacing: 2px;
        }
        .ping {
            font-size: 12px;
            color: #34d399;
            margin-top: 4px;
        }

        /* История множителей */
        .multipliers-history {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 8px 0;
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .multipliers-history .item {
            background: rgba(255,255,255,0.04);
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
        }
        .multipliers-history .item.high {
            color: #fbbf24;
        }

        /* Кнопка ставки */
        .bet-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            color: #0a0d1a;
            cursor: pointer;
            margin: 8px 0;
            transition: all 0.15s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .bet-btn:active { transform: scale(0.96); }
        .bet-btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        /* Таблица игроков */
        .players-table {
            background: rgba(255,255,255,0.02);
            border-radius: 16px;
            padding: 8px 4px;
            border: 1px solid rgba(255,255,255,0.04);
            margin-top: 8px;
        }
        .player-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .player-row:last-child {
            border-bottom: none;
        }
        .player-name {
            font-weight: 500;
            font-size: 14px;
            color: #e2e8f0;
        }
        .player-bet {
            font-size: 13px;
            color: #94a3b8;
        }
        .player-win {
            font-weight: 600;
            color: #34d399;
            font-size: 14px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
<div class="app" id="app">
    <!-- Хедер -->
    <div class="header">
        <div class="user-info">
            <div class="avatar">👤</div>
            <div>
                <div class="username">NIGAFRIKA</div>
                <div class="user-id">ID: 8256739004</div>
            </div>
        </div>
        <div class="balance-box">💎 <span id="balanceDisplay">200</span></div>
    </div>

    <!-- Дисплей -->
    <div class="rocket-display">
        <div class="multiplier" id="multiplierDisplay">X1.00</div>
        <div class="multiplier-label">Множитель</div>
        <div class="ping" id="pingDisplay">ПИНГ 213 MS</div>
    </div>

    <!-- История множителей -->
    <div class="multipliers-history" id="historyMultipliers">
        <span class="item high">X3.17</span>
        <span class="item">X1.27</span>
        <span class="item high">X16.02</span>
        <span class="item">X1.30</span>
        <span class="item">X1.58</span>
        <span class="item">X1.20</span>
        <span class="item">X1.02</span>
    </div>

    <!-- Кнопка СТАВКА -->
    <button class="bet-btn" id="betBtn">💰 СДЕЛАТЬ СТАВКУ</button>

    <!-- Таблица игроков -->
    <div class="players-table" id="playersTable">
        <div class="player-row">
            <span class="player-name">AFIYA СОКОЛОВ</span>
            <span class="player-bet">110</span>
            <span class="player-win">X1.19 → 131</span>
        </div>
        <div class="player-row">
            <span class="player-name">АЛИСКА</span>
            <span class="player-bet">40</span>
            <span class="player-win">X1.19 → 48</span>
        </div>
        <div class="player-row" id="myRow">
            <span class="player-name">👤 NIGAFRIKA</span>
            <span class="player-bet" id="myBet">0</span>
            <span class="player-win" id="myWin">—</span>
        </div>
    </div>

    <!-- Скрытые элементы для ставки -->
    <div id="betModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:100;justify-content:center;align-items:center;">
        <div style="background:#1a1f35;border-radius:24px;padding:28px 24px;max-width:340px;width:90%;border:1px solid rgba(255,255,255,0.06);">
            <h3 style="color:#fbbf24;text-align:center;margin-bottom:16px;">💎 Сделать ставку</h3>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;">
                <button class="bet-option" data-bet="10" style="background:rgba(255,255,255,0.06);border:none;border-radius:12px;padding:12px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;">10</button>
                <button class="bet-option" data-bet="50" style="background:rgba(255,255,255,0.06);border:none;border-radius:12px;padding:12px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;">50</button>
                <button class="bet-option" data-bet="100" style="background:rgba(255,255,255,0.06);border:none;border-radius:12px;padding:12px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;">100</button>
                <button class="bet-option" data-bet="500" style="background:rgba(255,255,255,0.06);border:none;border-radius:12px;padding:12px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;">500</button>
                <button class="bet-option" data-bet="1000" style="background:rgba(255,255,255,0.06);border:none;border-radius:12px;padding:12px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;">1000</button>
                <button class="bet-option" data-bet="custom" style="background:rgba(251,191,36,0.08);border:none;border-radius:12px;padding:12px;color:#fbbf24;font-size:16px;font-weight:600;cursor:pointer;">✏️</button>
            </div>
            <button id="closeBetModal" style="width:100%;padding:12px;background:rgba(255,255,255,0.06);border:none;border-radius:12px;color:#94a3b8;font-size:14px;cursor:pointer;">Отмена</button>
        </div>
    </div>
</div>

<script>
    let tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    // ===== СОСТОЯНИЕ =====
    let balance = 200;
    let currentMultiplier = 1.00;
    let isPlaying = false;
    let isCrashed = false;
    let crashPoint = 0;
    let gameInterval = null;
    let bet = 0;
    let myBet = 0;
    let myWin = 0;
    let historyMultipliers = [];

    // ===== DOM =====
    const balanceDisplay = document.getElementById('balanceDisplay');
    const multiplierDisplay = document.getElementById('multiplierDisplay');
    const pingDisplay = document.getElementById('pingDisplay');
    const historyMultEl = document.getElementById('historyMultipliers');
    const betBtn = document.getElementById('betBtn');
    const betModal = document.getElementById('betModal');
    const closeBetModal = document.getElementById('closeBetModal');
    const myBetEl = document.getElementById('myBet');
    const myWinEl = document.getElementById('myWin');

    // ===== ОБНОВЛЕНИЕ UI =====
    function updateUI() {
        balanceDisplay.textContent = balance;
        myBetEl.textContent = myBet;
        myWinEl.textContent = myWin ? `X${currentMultiplier.toFixed(2)} → ${myWin}` : '—';
    }

    function addHistoryMultiplier(val) {
        historyMultipliers.unshift(val);
        if (historyMultipliers.length > 20) historyMultipliers.pop();
        renderHistoryMultipliers();
    }

    function renderHistoryMultipliers() {
        historyMultEl.innerHTML = historyMultipliers.map(v => {
            const cls = v >= 3.0 ? 'item high' : 'item';
            return `<span class="${cls}">X${v.toFixed(2)}</span>`;
        }).join('');
    }

    // ===== ГЕНЕРАЦИЯ КРАША =====
    function generateCrash() {
        let r = Math.random();
        if (r < 0.07) return 1.02;
        let base = 1.0 / (1.0 - Math.pow(r, 1.2));
        return Math.round(Math.min(base, 30) * 100) / 100;
    }

    // ===== ЗАПУСК ИГРЫ =====
    function startGame() {
        if (isPlaying) return;
        if (bet <= 0 || bet > balance) {
            if (tg) tg.showAlert('⚠️ Выбери ставку!');
            return;
        }

        balance -= bet;
        myBet = bet;
        myWin = 0;
        updateUI();

        crashPoint = generateCrash();
        if (crashPoint < 1.01) crashPoint = 1.01;
        currentMultiplier = 1.00;
        isPlaying = true;
        isCrashed = false;
        betBtn.disabled = true;
        betBtn.textContent = '⏳ ИДЁТ ИГРА...';

        if (gameInterval) clearInterval(gameInterval);
        gameInterval = setInterval(() => {
            currentMultiplier += 0.01;
            let display = Math.round(currentMultiplier / 0.05) * 0.05;
            if (display < 1.15) display = 1.15;
            multiplierDisplay.textContent = `X${display.toFixed(2)}`;
            myWin = Math.round(bet * display);
            myWinEl.textContent = `X${display.toFixed(2)} → ${myWin}`;

            if (currentMultiplier >= crashPoint) {
                clearInterval(gameInterval);
                gameInterval = null;
                isCrashed = true;
                isPlaying = false;
                multiplierDisplay.textContent = `X${crashPoint.toFixed(2)}`;
                addHistoryMultiplier(crashPoint);
                betBtn.disabled = false;
                betBtn.textContent = '💥 БУМ!';
                setTimeout(() => {
                    betBtn.textContent = '💰 СДЕЛАТЬ СТАВКУ';
                    bet = 0;
                    myBet = 0;
                    myWin = 0;
                    updateUI();
                }, 2000);
                if (tg) tg.HapticFeedback?.impactOccurred('heavy');
            }
        }, 80);

        if (tg) tg.HapticFeedback?.impactOccurred('light');
    }

    // ===== МОДАЛКА СТАВКИ =====
    betBtn.addEventListener('click', function() {
        if (isPlaying) return;
        betModal.style.display = 'flex';
    });

    closeBetModal.addEventListener('click', function() {
        betModal.style.display = 'none';
    });
    betModal.addEventListener('click', function(e) {
        if (e.target === this) this.style.display = 'none';
    });

    document.querySelectorAll('.bet-option').forEach(btn => {
        btn.addEventListener('click', function() {
            const val = this.dataset.bet;
            if (val === 'custom') {
                const custom = prompt('Введите сумму:', '25');
                if (custom && !isNaN(custom) && Number(custom) > 0) {
                    bet = Number(custom);
                } else return;
            } else {
                bet = Number(val);
            }
            if (bet > balance) {
                if (tg) tg.showAlert('❌ Недостаточно монет!');
                bet = 0;
                return;
            }
            betModal.style.display = 'none';
            // Запускаем игру сразу после выбора ставки
            startGame();
        });
    });

    // ===== ИНИЦИАЛИЗАЦИЯ =====
    // Заполняем историю демо-множителями
    const demo = [3.17, 1.27, 16.02, 1.30, 1.58, 1.20, 1.02];
    historyMultipliers = demo;
    renderHistoryMultipliers();
    updateUI();
    multiplierDisplay.textContent = 'X1.00';
    pingDisplay.textContent = 'ПИНГ 213 MS';
    console.log('🚀 Ракетка NIGAFRIKA загружена');
</script>
</body>
</html>
