<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ракетка | График</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0d1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 16px;
        }
        .app {
            max-width: 420px;
            width:100%;
            background: rgba(10, 13, 26, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 20px 16px;
            border: 1px solid rgba(0, 255, 100, 0.15);
            box-shadow: 0 0 60px rgba(0, 255, 100, 0.05);
        }
        .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
        .logo { font-weight:800; font-size:20px; color: #00ff66; text-shadow:0 0 30px rgba(0,255,100,0.3); letter-spacing:1px; }
        .balance { font-size:14px; color:#88a0b0; background:rgba(0,255,100,0.06); padding:6px 16px; border-radius:20px; border:1px solid rgba(0,255,100,0.1); }
        .balance span { color:#00ff66; font-weight:700; }

        /* График */
        .chart-container {
            position: relative;
            width: 100%;
            height: 200px;
            margin: 8px 0 4px;
            background: rgba(0, 20, 10, 0.4);
            border-radius: 16px;
            border: 1px solid rgba(0, 255, 100, 0.06);
            overflow: hidden;
        }
        .chart-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        /* Ракета на графике */
        .rocket-on-chart {
            position: absolute;
            font-size: 32px;
            transition: all 0.05s linear;
            filter: drop-shadow(0 0 20px rgba(0, 255, 100, 0.6));
            transform-origin: center center;
            will-change: transform;
            pointer-events: none;
        }
        .rocket-on-chart.spin {
            animation: rocketSpin 0.3s linear infinite;
        }
        @keyframes rocketSpin {
            0% { transform: rotate(0deg) scale(1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        .rocket-display { text-align:center; padding:4px 0 8px; }
        .multiplier {
            font-size: 60px;
            font-weight:800;
            color: #00ff66;
            text-shadow: 0 0 60px rgba(0, 255, 100, 0.3);
            letter-spacing:-2px;
        }
        .multiplier-label { font-size:13px; color:rgba(100, 200, 150, 0.4); margin-top:-4px; letter-spacing:3px; text-transform:uppercase; }
        .status { font-size:15px; color:#88b0a0; margin-top:8px; min-height:24px; font-weight:500; }

        .timer { font-size:36px; font-weight:700; color:#00ff66; text-align:center; margin:4px 0; text-shadow:0 0 40px rgba(0,255,100,0.3); }
        .hidden { display:none !important; }

        .bet-section {
            background: rgba(0, 255, 100, 0.04);
            border-radius:20px;
            padding:14px 12px;
            margin:8px 0;
            border:1px solid rgba(0, 255, 100, 0.06);
        }
        .bet-title { font-size:11px; color:rgba(100, 200, 150, 0.4); text-transform:uppercase; letter-spacing:2px; margin-bottom:8px; }
        .bet-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
        .bet-btn {
            background:rgba(0,255,100,0.06);
            border:1px solid rgba(0,255,100,0.08);
            border-radius:12px;
            padding:10px 4px;
            color:#88c0a8;
            font-size:15px;
            font-weight:600;
            cursor:pointer;
            transition:all 0.2s;
        }
        .bet-btn:active { transform:scale(0.94); background:rgba(0,255,100,0.15); }
        .bet-btn.custom { background:rgba(0, 200, 255, 0.06); border-color:rgba(0, 200, 255, 0.1); color:#66ddff; }
        .bet-btn:disabled { opacity:0.3; cursor:not-allowed; }

        .action-btn {
            width:100%;
            padding:14px;
            border:none;
            border-radius:16px;
            font-size:17px;
            font-weight:700;
            cursor:pointer;
            transition:all 0.2s;
            margin-top:6px;
            text-transform:uppercase;
            letter-spacing:1px;
        }
        .action-btn:active { transform:scale(0.96); }
        .action-btn.start {
            background: linear-gradient(135deg, #00cc55, #00ff66);
            color:#0a0d1a;
            box-shadow:0 0 30px rgba(0,255,100,0.2);
        }
        .action-btn.cashout {
            background: linear-gradient(135deg, #00ff88, #00ffcc);
            color:#0a0d1a;
            box-shadow:0 0 30px rgba(0,255,200,0.2);
        }
        .action-btn:disabled { opacity:0.3; pointer-events:none; }

        .history {
            background:rgba(0,255,100,0.02);
            border-radius:16px;
            padding:10px 12px;
            margin:10px 0 4px;
            max-height:80px;
            overflow-y:auto;
            font-size:13px;
            color:#88b0a0;
            border:1px solid rgba(0,255,100,0.04);
        }
        .history-item { display:flex; justify-content:space-between; padding:3px 0; border-bottom:1px solid rgba(0,255,100,0.04); }
        .history-item.win { color:#00ff66; }
        .history-item.lose { color:#ff4466; }

        .bottom-menu {
            display:flex;
            justify-content:space-around;
            margin-top:10px;
            padding-top:12px;
            border-top:1px solid rgba(0,255,100,0.06);
        }
        .menu-item {
            text-align:center;
            font-size:11px;
            color:rgba(100, 200, 150, 0.4);
            cursor:pointer;
            transition:color 0.2s;
            background:none;
            border:none;
            padding:0;
        }
        .menu-item:hover { color:#00ff66; }
        .menu-item .icon { font-size:20px; display:block; margin-bottom:2px; }
    </style>
</head>
<body>
<div class="app" id="app">
    <div class="header">
        <div class="logo">📈 РАКЕТКА</div>
        <div class="balance">💎 <span id="balanceDisplay">200</span></div>
    </div>

    <!-- График с ракетой -->
    <div class="chart-container" id="chartContainer">
        <canvas id="chartCanvas" class="chart-canvas"></canvas>
        <div class="rocket-on-chart" id="rocketOnChart">🚀</div>
    </div>

    <div class="rocket-display">
        <div class="multiplier" id="multiplierDisplay">1.00X</div>
        <div class="multiplier-label">Множитель</div>
        <div class="status" id="statusDisplay">Выбери ставку</div>
    </div>

    <div class="timer hidden" id="timerDisplay"></div>

    <div class="bet-section" id="betSection">
        <div class="bet-title">Выбери ставку</div>
        <div class="bet-grid">
            <button class="bet-btn" data-bet="10">10</button>
            <button class="bet-btn" data-bet="50">50</button>
            <button class="bet-btn" data-bet="100">100</button>
            <button class="bet-btn" data-bet="500">500</button>
            <button class="bet-btn" data-bet="1000">1000</button>
            <button class="bet-btn custom" data-bet="custom">✏️ Своя</button>
        </div>
    </div>

    <button class="action-btn start" id="startBtn">🚀 Старт</button>
    <button class="action-btn cashout hidden" id="cashoutBtn">🎁 Забрать</button>

    <div class="history" id="historyContainer">
        <div style="color:rgba(100,200,150,0.3);font-size:11px;text-align:center;margin-bottom:4px;">История игр</div>
        <div id="historyList"></div>
    </div>

    <div class="bottom-menu">
        <button class="menu-item" id="menuBalance"><span class="icon">💎</span>Баланс</button>
        <button class="menu-item" id="menuTop"><span class="icon">🏆</span>Топ</button>
        <button class="menu-item" id="menuHelp"><span class="icon">❄️</span>Помощь</button>
    </div>
</div>

<script>
    let tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    // ===== СОСТОЯНИЕ =====
    let balance = 200;
    let bet = 0;
    let multiplier = 1.00;
    let isPlaying = false;
    let isCrashed = false;
    let crashPoint = 0;
    let gameInterval = null;
    let timerInterval = null;
    let countdown = 5;
    let gameHistory = [];
    let isCashoutClicked = false;
    let chartData = [];
    let chartIndex = 0;

    // ===== DOM =====
    const balanceDisplay = document.getElementById('balanceDisplay');
    const multiplierDisplay = document.getElementById('multiplierDisplay');
    const statusDisplay = document.getElementById('statusDisplay');
    const betSection = document.getElementById('betSection');
    const startBtn = document.getElementById('startBtn');
    const cashoutBtn = document.getElementById('cashoutBtn');
    const timerDisplay = document.getElementById('timerDisplay');
    const historyList = document.getElementById('historyList');
    const canvas = document.getElementById('chartCanvas');
    const ctx = canvas.getContext('2d');
    const rocketEl = document.getElementById('rocketOnChart');

    function updateBalanceUI() { balanceDisplay.textContent = balance; }

    function addHistory(type, betAmount, result) {
        gameHistory.unshift({ type, bet: betAmount, result });
        if (gameHistory.length > 20) gameHistory.pop();
        renderHistory();
    }
    function renderHistory() {
        historyList.innerHTML = gameHistory.map(item => {
            const cls = item.type === 'win' ? 'win' : 'lose';
            const sign = item.type === 'win' ? '+' : '-';
            return `<div class="history-item ${cls}"><span>${item.bet} монет</span><span>${sign}${item.result}</span></div>`;
        }).join('');
    }

    // ===== ГРАФИК =====
    function resizeCanvas() {
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width * 0.95;
        canvas.height = rect.height * 0.9;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    function drawChart(currentMultiplier, crash) {
        const w = canvas.width;
        const h = canvas.height;
        ctx.clearRect(0, 0, w, h);
        if (chartData.length < 2) {
            ctx.fillStyle = 'rgba(0,255,100,0.1)';
            ctx.font = '14px sans-serif';
            ctx.fillText('Ожидание старта...', w/2-60, h/2);
            return;
        }
        const maxVal = Math.max(crash || 2, Math.max(...chartData) + 0.5);
        const minVal = 0.5;
        const range = maxVal - minVal;

        // Рисуем сетку
        ctx.strokeStyle = 'rgba(0,255,100,0.05)';
        ctx.lineWidth = 0.5;
        for (let i = 0; i <= 5; i++) {
            const y = h - (i / 5) * h * 0.8 - 10;
            ctx.beginPath();
            ctx.moveTo(10, y);
            ctx.lineTo(w - 10, y);
            ctx.stroke();
            ctx.fillStyle = 'rgba(0,255,100,0.2)';
            ctx.font = '9px sans-serif';
            ctx.fillText((minVal + (i / 5) * range).toFixed(1), 2, y-2);
        }

        // Линия графика
        ctx.beginPath();
        ctx.strokeStyle = '#00ff66';
        ctx.lineWidth = 2.5;
        ctx.shadowColor = 'rgba(0,255,100,0.3)';
        ctx.shadowBlur = 10;
        for (let i = 0; i < chartData.length; i++) {
            const x = 10 + (i / (chartData.length - 1 || 1)) * (w - 20);
            const y = h - 10 - ((chartData[i] - minVal) / range) * h * 0.8;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Заливка под графиком
        ctx.beginPath();
        const lastX = 10 + ((chartData.length - 1) / (chartData.length - 1 || 1)) * (w - 20);
        const lastY = h - 10 - ((chartData[chartData.length-1] - minVal) / range) * h * 0.8;
        ctx.moveTo(10, h-10);
        for (let i = 0; i < chartData.length; i++) {
            const x = 10 + (i / (chartData.length - 1 || 1)) * (w - 20);
            const y = h - 10 - ((chartData[i] - minVal) / range) * h * 0.8;
            ctx.lineTo(x, y);
        }
        ctx.lineTo(lastX, h-10);
        ctx.closePath();
        const grad = ctx.createLinearGradient(0, 0, 0, h);
        grad.addColorStop(0, 'rgba(0,255,100,0.15)');
        grad.addColorStop(1, 'rgba(0,255,100,0)');
        ctx.fillStyle = grad;
        ctx.fill();

        // Текущее значение
        if (chartData.length > 0) {
            const last = chartData[chartData.length-1];
            ctx.fillStyle = '#00ff66';
            ctx.font = 'bold 12px sans-serif';
            ctx.fillText(last.toFixed(2) + 'X', w-60, 20);
        }

        // Обновляем позицию ракеты
        if (chartData.length > 1) {
            const x = 10 + ((chartData.length - 1) / (chartData.length - 1 || 1)) * (w - 20);
            const y = h - 10 - ((chartData[chartData.length-1] - minVal) / range) * h * 0.8;
            rocketEl.style.left = (x - 16) + 'px';
            rocketEl.style.top = (y - 16) + 'px';
            rocketEl.style.display = 'block';
            // Вращение
            if (isPlaying && !isCrashed) {
                rocketEl.classList.add('spin');
            } else {
                rocketEl.classList.remove('spin');
            }
        }
    }

    // ===== ГЕНЕРАЦИЯ КРАША =====
    function generateCrashPoint() {
        let r = Math.random();
        if (r < 0.07) return 1.05;
        let base = 1.0 / (1.0 - Math.pow(r, 1.2));
        let crash = Math.min(base, 30);
        return Math.round(crash * 100) / 100;
    }

    // ===== ВЫБОР СТАВКИ =====
    document.querySelectorAll('.bet-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            if (isPlaying) return;
            const val = this.dataset.bet;
            if (val === 'custom') {
                const custom = prompt('Введите свою сумму:', '25');
                if (custom && !isNaN(custom) && Number(custom) > 0) bet = Number(custom);
                else return;
            } else { bet = Number(val); }
            if (bet > balance) { statusDisplay.textContent = '❌ Недостаточно монет!'; bet = 0; return; }
            statusDisplay.textContent = `Ставка: ${bet} монет`;
            document.querySelectorAll('.bet-btn').forEach(b => b.style.border = 'none');
            this.style.border = '2px solid #00ff66';
        });
    });

    // ===== СТАРТ =====
    startBtn.addEventListener('click', function() {
        if (isPlaying || bet <= 0 || bet > balance) {
            if (bet <= 0) statusDisplay.textContent = '⚠️ Выбери ставку!';
            else if (bet > balance) statusDisplay.textContent = '❌ Недостаточно монет!';
            return;
        }
        document.querySelectorAll('.bet-btn').forEach(b => b.disabled = true);
        startBtn.disabled = true;
        countdown = 5;
        timerDisplay.textContent = countdown;
        timerDisplay.classList.remove('hidden');
        statusDisplay.textContent = `⏳ ${countdown} сек`;
        timerInterval = setInterval(() => {
            countdown--;
            if (countdown <= 0) {
                clearInterval(timerInterval); timerInterval = null;
                timerDisplay.classList.add('hidden');
                actuallyStartGame();
            } else {
                timerDisplay.textContent = countdown;
                statusDisplay.textContent = `⏳ ${countdown} сек`;
            }
        }, 1000);
    });

    // ===== ЗАПУСК ИГРЫ =====
    function actuallyStartGame() {
        if (bet <= 0 || bet > balance) { statusDisplay.textContent = '⚠️ Ошибка'; return; }
        balance -= bet; updateBalanceUI();
        crashPoint = generateCrashPoint(); if (crashPoint < 1.01) crashPoint = 1.01;
        multiplier = 1.00; isPlaying = true; isCrashed = false; isCashoutClicked = false;
        chartData = [1.0]; chartIndex = 1;
        betSection.classList.add('hidden'); startBtn.classList.add('hidden');
        cashoutBtn.classList.remove('hidden'); cashoutBtn.disabled = false;
        statusDisplay.textContent = '🚀 Взлёт!';
        if (gameInterval) clearInterval(gameInterval);
        gameInterval = setInterval(() => {
            // Шаг 0.01, но отображаем с округлением до 0.05
            multiplier += 0.01;
            let displayMult = Math.round(multiplier / 0.05) * 0.05;
            if (displayMult < 1.15) displayMult = 1.15;
            chartData.push(displayMult);
            multiplierDisplay.textContent = displayMult.toFixed(2) + 'X';
            drawChart(displayMult, crashPoint);
            if (multiplier >= crashPoint) {
                clearInterval(gameInterval); gameInterval = null;
                isCrashed = true; isPlaying = false;
                multiplierDisplay.textContent = crashPoint.toFixed(2) + 'X';
                statusDisplay.textContent = `💥 БУМ! ${crashPoint.toFixed(2)}X — проиграл ${bet} монет`;
                addHistory('lose', bet, bet);
                cashoutBtn.classList.add('hidden');
                setTimeout(() => resetGame(), 1500);
                if (tg) tg.HapticFeedback?.impactOccurred('heavy');
            }
        }, 80);
        if (tg) tg.HapticFeedback?.impactOccurred('light');
    }

    function resetGame() {
        betSection.classList.remove('hidden'); startBtn.classList.remove('hidden');
        cashoutBtn.classList.add('hidden');
        document.querySelectorAll('.bet-btn').forEach(b => b.disabled = false);
        startBtn.disabled = false;
        document.querySelectorAll('.bet-btn').forEach(b => b.style.border = 'none');
        bet = 0; statusDisplay.textContent = 'Выбери ставку';
        chartData = [];
        drawChart(0, 0);
        rocketEl.style.display = 'none';
        multiplierDisplay.textContent = '1.00X';
    }

    cashoutBtn.addEventListener('click', function() {
        if (!isPlaying || isCrashed) return;
        if (isCashoutClicked) return;
        isCashoutClicked = true; this.disabled = true;
        clearInterval(gameInterval); gameInterval = null;
        isPlaying = false;
        let displayMult = Math.round(multiplier / 0.05) * 0.05;
        if (displayMult < 1.15) displayMult = 1.15;
        const win = Math.round(bet * displayMult);
        balance += win; updateBalanceUI();
        statusDisplay.textContent = `🎁 Забрал ${displayMult.toFixed(2)}X! Выигрыш: ${win} монет`;
        addHistory('win', bet, win);
        cashoutBtn.classList.add('hidden');
        setTimeout(() => resetGame(), 1500);
        if (tg) tg.HapticFeedback?.notificationOccurred('success');
    });

    document.getElementById('menuBalance').addEventListener('click', function() {
        if (tg) tg.showAlert(`💎 Твой баланс: ${balance} монет`);
        else alert(`💎 Твой баланс: ${balance} монет`);
    });
    document.getElementById('menuTop').addEventListener('click', function() {
        const msg = '🏆 Топ игроков\n\n1. Ты — ' + balance + ' монет';
        if (tg) tg.showAlert(msg); else alert(msg);
    });
    document.getElementById('menuHelp').addEventListener('click', function() {
        const msg = '📈 График-ракетка:\n\n1. Выбери ставку\n2. Нажми «Старт»\n3. Таймер 5 сек\n4. Ракета летит по графику\n5. Нажми «Забрать»\n6. Если взрыв — проигрыш\n\nВыигрыш = ставка × множитель';
        if (tg) tg.showAlert(msg); else alert(msg);
    });

    // ===== ИНИЦИАЛИЗАЦИЯ =====
    updateBalanceUI();
    statusDisplay.textContent = 'Выбери ставку и нажми «Старт»';
    multiplierDisplay.textContent = '1.00X';
    chartData = [1.0];
    drawChart(1.0, 0);
    rocketEl.style.display = 'none';
    console.log('📈 Ракетка с графиком загружена');
</script>
</body>
</html>
