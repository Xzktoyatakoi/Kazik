<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ракетка 🚀</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f4e 40%, #0f1535 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 12px;
        }
        .app {
            max-width: 420px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 28px;
            padding: 20px 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
        }
        /* Заголовок */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .logo {
            font-weight: 700;
            font-size: 20px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .balance {
            font-size: 14px;
            color: #94a3b8;
            background: rgba(255, 255, 255, 0.06);
            padding: 6px 14px;
            border-radius: 20px;
        }
        .balance span {
            color: #fbbf24;
            font-weight: 700;
        }
        /* Дисплей множителя */
        .rocket-display {
            text-align: center;
            padding: 20px 0 8px;
        }
        .multiplier {
            font-size: 68px;
            font-weight: 800;
            background: linear-gradient(135deg, #fbbf24, #f59e0b, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 80px rgba(251, 191, 36, 0.15);
            letter-spacing: -2px;
        }
        .multiplier-label {
            font-size: 13px;
            color: #64748b;
            margin-top: -4px;
            letter-spacing: 2px;
        }
        .status {
            font-size: 15px;
            color: #94a3b8;
            margin-top: 8px;
            min-height: 24px;
        }
        /* Таймер */
        .timer {
            font-size: 32px;
            font-weight: 700;
            color: #fbbf24;
            text-align: center;
            margin: 4px 0;
        }
        .hidden {
            display: none !important;
        }
        /* Секция ставок */
        .bet-section {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 18px;
            padding: 14px 12px;
            margin: 8px 0;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .bet-title {
            font-size: 12px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .bet-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .bet-btn {
            background: rgba(255, 255, 255, 0.06);
            border: none;
            border-radius: 12px;
            padding: 10px 4px;
            color: #e2e8f0;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }
        .bet-btn:active {
            transform: scale(0.94);
            background: rgba(255, 255, 255, 0.12);
        }
        .bet-btn.custom {
            background: rgba(251, 191, 36, 0.08);
            color: #fbbf24;
        }
        /* Кнопки действий */
        .action-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
            margin-top: 6px;
        }
        .action-btn:active {
            transform: scale(0.96);
        }
        .action-btn.start {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #0b0e1a;
        }
        .action-btn.cashout {
            background: linear-gradient(135deg, #34d399, #10b981);
            color: #0b0e1a;
        }
        .action-btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        /* История игр */
        .history {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            padding: 10px 12px;
            margin: 10px 0 4px;
            max-height: 90px;
            overflow-y: auto;
            font-size: 13px;
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }
        .history-item.win {
            color: #34d399;
        }
        .history-item.lose {
            color: #f87171;
        }
        /* Нижнее меню */
        .bottom-menu {
            display: flex;
            justify-content: space-around;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }
        .menu-item {
            text-align: center;
            font-size: 11px;
            color: #64748b;
            cursor: pointer;
            transition: color 0.2s;
            background: none;
            border: none;
            padding: 0;
        }
        .menu-item:hover {
            color: #e2e8f0;
        }
        .menu-item .icon {
            font-size: 22px;
            display: block;
            margin-bottom: 2px;
        }
        /* Меню пополнения (всплывающее) */
        .deposit-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .deposit-overlay.show {
            display: flex;
        }
        .deposit-modal {
            background: #1a1f35;
            border-radius: 28px;
            padding: 28px 24px;
            max-width: 360px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
        }
        .deposit-modal h3 {
            color: #fbbf24;
            font-size: 20px;
            text-align: center;
            margin-bottom: 16px;
        }
        .deposit-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .deposit-btn {
            background: rgba(251, 191, 36, 0.08);
            border: 1px solid rgba(251, 191, 36, 0.15);
            border-radius: 14px;
            padding: 14px 6px;
            color: #fbbf24;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }
        .deposit-btn:active {
            transform: scale(0.94);
            background: rgba(251, 191, 36, 0.2);
        }
        .deposit-close {
            background: rgba(255, 255, 255, 0.06);
            border: none;
            color: #94a3b8;
            padding: 10px;
            border-radius: 12px;
            font-size: 14px;
            width: 100%;
            margin-top: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app" id="app">
    <!-- Заголовок -->
    <div class="header">
        <div class="logo">🚀 Ракетка</div>
        <div class="balance">💎 <span id="balanceDisplay">200</span></div>
    </div>

    <!-- Множитель -->
    <div class="rocket-display">
        <div class="multiplier" id="multiplierDisplay">1.00X</div>
        <div class="multiplier-label">Множитель</div>
        <div class="status" id="statusDisplay">Выбери ставку</div>
    </div>

    <!-- Таймер -->
    <div class="timer hidden" id="timerDisplay"></div>

    <!-- Ставки -->
    <div class="bet-section" id="betSection">
        <div class="bet-title">Выбери ставку</div>
        <div class="bet-grid">
            <button class="bet-btn" data-bet="10">10</button>
            <button class="bet-btn" data-bet="50">50</button>
            <button class="bet-btn" data-bet="100">100</button>
            <button class="bet-btn" data-bet="500">500</button>
            <button class="bet-btn" data-bet="1000">1000</button>
            <button class="bet-btn custom" data-bet="custom">✏️ Своя</button>
        </div>
    </div>

    <!-- Кнопки Старт / Забрать -->
    <button class="action-btn start" id="startBtn">🚀 Старт</button>
    <button class="action-btn cashout hidden" id="cashoutBtn">🎁 Забрать</button>

    <!-- История -->
    <div class="history" id="historyContainer">
        <div style="color:#64748b;font-size:11px;text-align:center;margin-bottom:4px;">История игр</div>
        <div id="historyList"></div>
    </div>

    <!-- Нижнее меню -->
    <div class="bottom-menu">
        <button class="menu-item" id="menuBalance"><span class="icon">💎</span>Баланс</button>
        <button class="menu-item" id="menuTop"><span class="icon">🏆</span>Топ</button>
        <button class="menu-item" id="menuDeposit"><span class="icon">⭐</span>Пополнить</button>
        <button class="menu-item" id="menuHelp"><span class="icon">❄️</span>Помощь</button>
    </div>
</div>

<!-- Модальное окно пополнения -->
<div class="deposit-overlay" id="depositOverlay">
    <div class="deposit-modal">
        <h3>⭐ Пополнить монеты</h3>
        <p style="color:#94a3b8;text-align:center;margin-bottom:14px;font-size:14px;">1 Star = 10 монет</p>
        <div class="deposit-grid">
            <button class="deposit-btn" data-stars="1">1 ⭐</button>
            <button class="deposit-btn" data-stars="5">5 ⭐</button>
            <button class="deposit-btn" data-stars="10">10 ⭐</button>
            <button class="deposit-btn" data-stars="25">25 ⭐</button>
            <button class="deposit-btn" data-stars="50">50 ⭐</button>
            <button class="deposit-btn" data-stars="100">100 ⭐</button>
        </div>
        <button class="deposit-close" id="depositClose">✕ Закрыть</button>
    </div>
</div>

<script>
    // ===== Telegram WebApp =====
    let tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    // ===== Состояние =====
    let balance = 200;
    let bet = 0;
    let multiplier = 1.00;
    let isPlaying = false;
    let isCrashed = false;
    let crashPoint = 0;
    let gameInterval = null;
    let timerInterval = null;
    let countdown = 5;
    let gameHistory = [];

    // ===== DOM =====
    const balanceDisplay = document.getElementById('balanceDisplay');
    const multiplierDisplay = document.getElementById('multiplierDisplay');
    const statusDisplay = document.getElementById('statusDisplay');
    const betSection = document.getElementById('betSection');
    const startBtn = document.getElementById('startBtn');
    const cashoutBtn = document.getElementById('cashoutBtn');
    const timerDisplay = document.getElementById('timerDisplay');
    const historyList = document.getElementById('historyList');
    const depositOverlay = document.getElementById('depositOverlay');

    // ===== Обновление баланса =====
    function updateBalanceUI() {
        balanceDisplay.textContent = balance;
    }

    // ===== История =====
    function addHistory(type, betAmount, result) {
        gameHistory.unshift({ type, bet: betAmount, result });
        if (gameHistory.length > 20) gameHistory.pop();
        renderHistory();
    }

    function renderHistory() {
        historyList.innerHTML = gameHistory.map(item => {
            const cls = item.type === 'win' ? 'win' : 'lose';
            const sign = item.type === 'win' ? '+' : '-';
            return `<div class="history-item ${cls}"><span>${item.bet} монет</span><span>${sign}${item.result}</span></div>`;
        }).join('');
    }

    // ===== Генерация краш-точки (реалистичные шансы, может быть 1.00) =====
    function generateCrashPoint() {
        let r = Math.random();
        // Смесь: иногда сразу падает на 1.00, иногда немного выше
        if (r < 0.05) return 1.00; // 5% шанс мгновенного краша
        let base = 1.0 / (1.0 - Math.pow(r, 1.3));
        let crash = Math.min(base, 30);
        return Math.round(crash * 100) / 100;
    }

    // ===== Выбор ставки =====
    document.querySelectorAll('.bet-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            if (isPlaying) return;
            const val = this.dataset.bet;
            if (val === 'custom') {
                const custom = prompt('Введите свою сумму:', '25');
                if (custom && !isNaN(custom) && Number(custom) > 0) bet = Number(custom);
                else return;
            } else {
                bet = Number(val);
            }
            if (bet > balance) {
                statusDisplay.textContent = '❌ Недостаточно монет!';
                bet = 0;
                return;
            }
            statusDisplay.textContent = `Ставка: ${bet} монет`;
            document.querySelectorAll('.bet-btn').forEach(b => b.style.border = 'none');
            this.style.border = '2px solid #fbbf24';
        });
    });

    // ===== Пополнение (через модалку) =====
    document.querySelectorAll('.deposit-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const stars = parseInt(this.dataset.stars);
            const coins = stars * 10;
            balance += coins;
            updateBalanceUI();
            statusDisplay.textContent = `✅ Пополнено ${coins} монет (${stars} ⭐)`;
            depositOverlay.classList.remove('show');
            if (tg) tg.HapticFeedback?.notificationOccurred('success');
        });
    });

    document.getElementById('menuDeposit').addEventListener('click', function() {
        depositOverlay.classList.add('show');
    });
    document.getElementById('depositClose').addEventListener('click', function() {
        depositOverlay.classList.remove('show');
    });
    depositOverlay.addEventListener('click', function(e) {
        if (e.target === this) this.classList.remove('show');
    });

    // ===== Таймер =====
    function startCountdown() {
        countdown = 5;
        timerDisplay.textContent = countdown;
        timerDisplay.classList.remove('hidden');
        timerInterval = setInterval(() => {
            countdown--;
            if (countdown <= 0) {
                clearInterval(timerInterval);
                timerInterval = null;
                timerDisplay.classList.add('hidden');
                actuallyStartGame();
            } else {
                timerDisplay.textContent = countdown;
            }
        }, 1000);
    }

    function actuallyStartGame() {
        if (bet <= 0 || bet > balance) {
            statusDisplay.textContent = '⚠️ Ошибка ставки';
            return;
        }

        balance -= bet;
        updateBalanceUI();

        crashPoint = generateCrashPoint();
        if (crashPoint < 1.00) crashPoint = 1.00;

        multiplier = 1.00;
        isPlaying = true;
        isCrashed = false;

        betSection.classList.add('hidden');
        startBtn.classList.add('hidden');
        cashoutBtn.classList.remove('hidden');
        statusDisplay.textContent = '🚀 Взлёт!';

        if (gameInterval) clearInterval(gameInterval);
        // Имитация плавного роста
        let step = 0.05;
        let delay = 200;
        gameInterval = setInterval(() => {
            multiplier += step;
            multiplier = Math.round(multiplier * 100) / 100;
            multiplierDisplay.textContent = multiplier.toFixed(2) + 'X';

            if (multiplier >= crashPoint) {
                clearInterval(gameInterval);
                gameInterval = null;
                isCrashed = true;
                isPlaying = false;
                multiplierDisplay.textContent = crashPoint.toFixed(2) + 'X';
                statusDisplay.textContent = `💥 БУМ! ${crashPoint.toFixed(2)}X — проиграл ${bet} монет`;
                addHistory('lose', bet, bet);
                setTimeout(() => {
                    betSection.classList.remove('hidden');
                    startBtn.classList.remove('hidden');
                    cashoutBtn.classList.add('hidden');
                    document.querySelectorAll('.bet-btn').forEach(b => b.style.border = 'none');
                    bet = 0;
                }, 1200);
                if (tg) tg.HapticFeedback?.impactOccurred('heavy');
            }
        }, delay);

        if (tg) tg.HapticFeedback?.impactOccurred('light');
    }

    // ===== Старт =====
    startBtn.addEventListener('click', function() {
        if (isPlaying || bet <= 0 || bet > balance) {
            if (bet <= 0) statusDisplay.textContent = '⚠️ Выбери ставку!';
            else if (bet > balance) statusDisplay.textContent = '❌ Недостаточно монет!';
            return;
        }
        startCountdown();
    });

    // ===== Забрать =====
    cashoutBtn.addEventListener('click', function() {
        if (!isPlaying || isCrashed) return;
        clearInterval(gameInterval);
        gameInterval = null;
        isPlaying = false;
        const win = Math.round(bet * multiplier);
        balance += win;
        updateBalanceUI();
        statusDisplay.textContent = `🎁 Забрал ${multiplier.toFixed(2)}X! Выигрыш: ${win} монет`;
        addHistory('win', bet, win);
        betSection.classList.remove('hidden');
        startBtn.classList.remove('hidden');
        cashoutBtn.classList.add('hidden');
        document.querySelectorAll('.bet-btn').forEach(b => b.style.border = 'none');
        bet = 0;
        if (tg) tg.HapticFeedback?.notificationOccurred('success');
    });

    // ===== Меню =====
    document.getElementById('menuBalance').addEventListener('click', function() {
        if (tg) tg.showAlert(`💎 Твой баланс: ${balance} монет`);
        else alert(`💎 Твой баланс: ${balance} монет`);
    });
    document.getElementById('menuTop').addEventListener('click', function() {
        const msg = '🏆 Топ игроков\n\n1. Ты — ' + balance + ' монет\nОстальные пока не играли 😄';
        if (tg) tg.showAlert(msg);
        else alert(msg);
    });
    document.getElementById('menuHelp').addEventListener('click', function() {
        const msg = '❄️ Как играть:\n\n1. Выбери ставку\n2. Нажми «Старт»\n3. Ракета взлетает — множитель растёт\n4. Нажми «Забрать» — зафиксируй выигрыш\n5. Если ракета взорвалась — ставка проиграна\n\nВыигрыш = ставка × множитель\n\n⭐ Пополняй баланс монетами за Stars (1 Star = 10 монет)';
        if (tg) tg.showAlert(msg);
        else alert(msg);
    });

    // ===== Инициализация =====
    updateBalanceUI();
    statusDisplay.textContent = 'Выбери ставку и нажми «Старт»';
    multiplierDisplay.textContent = '1.00X';
    console.log('🚀 Ракетка загружена');
</script>
</body>
    </html>
