<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ракетка 🚀</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(ellipse at 50% 0%, #1a1f4e 0%, #0b0e1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 16px;
        }
        .app {
            max-width: 420px;
            width:100%;
            background:rgba(255,255,255,0.06);
            backdrop-filter:blur(12px);
            border-radius:32px;
            padding:20px 16px;
            border:1px solid rgba(255,255,255,0.08);
            box-shadow:0 30px 60px rgba(0,0,0,0.6);
        }
        .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
        .logo { font-weight:700; font-size:20px; background:linear-gradient(135deg,#fbbf24,#f59e0b); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .balance { font-size:14px; color:#a0aec0; background:rgba(255,255,255,0.08); padding:6px 14px; border-radius:20px; }
        .balance span { color:#fbbf24; font-weight:700; }

        .rocket-display { text-align:center; padding:12px 0 4px; }
        .multiplier { font-size:60px; font-weight:800; background:linear-gradient(135deg,#fbbf24,#f59e0b,#f97316); -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-shadow:0 0 60px rgba(251,191,36,0.2); letter-spacing:-2px; }
        .multiplier-label { font-size:13px; color:#94a3b8; margin-top:-4px; letter-spacing:2px; }
        .status { font-size:15px; color:#cbd5e1; margin-top:8px; min-height:24px; font-weight:500; }

        .timer { font-size:32px; font-weight:700; color:#fbbf24; text-align:center; margin:4px 0; }
        .hidden { display:none !important; }

        .bet-section { background:rgba(255,255,255,0.05); border-radius:20px; padding:14px 12px; margin:8px 0; border:1px solid rgba(255,255,255,0.04); }
        .bet-title { font-size:12px; color:#94a3b8; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
        .bet-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
        .bet-btn { background:rgba(255,255,255,0.06); border:none; border-radius:12px; padding:10px 4px; color:#e2e8f0; font-size:15px; font-weight:600; cursor:pointer; transition:all 0.15s; }
        .bet-btn:active { transform:scale(0.94); background:rgba(255,255,255,0.15); }
        .bet-btn.custom { background:rgba(251,191,36,0.08); color:#fbbf24; }
        .bet-btn:disabled { opacity:0.3; cursor:not-allowed; }

        .action-btn { width:100%; padding:14px; border:none; border-radius:16px; font-size:17px; font-weight:700; cursor:pointer; transition:all 0.15s; margin-top:6px; }
        .action-btn:active { transform:scale(0.96); }
        .action-btn.start { background:linear-gradient(135deg,#fbbf24,#f59e0b); color:#0b0e1a; }
        .action-btn.cashout { background:linear-gradient(135deg,#34d399,#10b981); color:#0b0e1a; }
        .action-btn:disabled { opacity:0.4; pointer-events:none; }

        .history { background:rgba(255,255,255,0.04); border-radius:16px; padding:10px 12px; margin:10px 0 4px; max-height:80px; overflow-y:auto; font-size:13px; color:#94a3b8; border:1px solid rgba(255,255,255,0.04); }
        .history-item { display:flex; justify-content:space-between; padding:3px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
        .history-item.win { color:#34d399; }
        .history-item.lose { color:#f87171; }

        .bottom-menu { display:flex; justify-content:space-around; margin-top:10px; padding-top:12px; border-top:1px solid rgba(255,255,255,0.06); }
        .menu-item { text-align:center; font-size:11px; color:#64748b; cursor:pointer; transition:color 0.2s; background:none; border:none; padding:0; }
        .menu-item:hover { color:#e2e8f0; }
        .menu-item .icon { font-size:20px; display:block; margin-bottom:2px; }
    </style>
</head>
<body>
<div class="app" id="app">
    <div class="header">
        <div class="logo">🚀 Ракетка</div>
        <div class="balance">💎 <span id="balanceDisplay">200</span></div>
    </div>

    <div class="rocket-display">
        <div class="multiplier" id="multiplierDisplay">1.00X</div>
        <div class="multiplier-label">Множитель</div>
        <div class="status" id="statusDisplay">Выбери ставку</div>
    </div>

    <div class="timer hidden" id="timerDisplay"></div>

    <div class="bet-section" id="betSection">
        <div class="bet-title">Выбери ставку</div>
        <div class="bet-grid">
            <button class="bet-btn" data-bet="10">10</button>
            <button class="bet-btn" data-bet="50">50</button>
            <button class="bet-btn" data-bet="100">100</button>
            <button class="bet-btn" data-bet="500">500</button>
            <button class="bet-btn" data-bet="1000">1000</button>
            <button class="bet-btn custom" data-bet="custom">✏️ Своя</button>
        </div>
    </div>

    <button class="action-btn start" id="startBtn">🚀 Старт</button>
    <button class="action-btn cashout hidden" id="cashoutBtn">🎁 Забрать</button>

    <div class="history" id="historyContainer">
        <div style="color:#64748b;font-size:11px;text-align:center;margin-bottom:4px;">История игр</div>
        <div id="historyList"></div>
    </div>

    <div class="bottom-menu">
        <button class="menu-item" id="menuBalance"><span class="icon">💎</span>Баланс</button>
        <button class="menu-item" id="menuTop"><span class="icon">🏆</span>Топ</button>
        <button class="menu-item" id="menuHelp"><span class="icon">❄️</span>Помощь</button>
    </div>
</div>

<script>
    let tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    // ===== СОСТОЯНИЕ =====
    let balance = 200;
    let bet = 0;
    let multiplier = 1.00;
    let isPlaying = false;
    let isCrashed = false;
    let crashPoint = 0;
    let gameInterval = null;
    let timerInterval = null;
    let countdown = 5;
    let gameHistory = [];
    let isCashoutClicked = false;

    // ===== DOM =====
    const balanceDisplay = document.getElementById('balanceDisplay');
    const multiplierDisplay = document.getElementById('multiplierDisplay');
    const statusDisplay = document.getElementById('statusDisplay');
    const betSection = document.getElementById('betSection');
    const startBtn = document.getElementById('startBtn');
    const cashoutBtn = document.getElementById('cashoutBtn');
    const timerDisplay = document.getElementById('timerDisplay');
    const historyList = document.getElementById('historyList');

    function updateBalanceUI() {
        balanceDisplay.textContent = balance;
    }

    function addHistory(type, betAmount, result) {
        gameHistory.unshift({ type, bet: betAmount, result });
        if (gameHistory.length > 20) gameHistory.pop();
        renderHistory();
    }

    function renderHistory() {
        historyList.innerHTML = gameHistory.map(item => {
            const cls = item.type === 'win' ? 'win' : 'lose';
            const sign = item.type === 'win' ? '+' : '-';
            return `<div class="history-item ${cls}"><span>${item.bet} монет</span><span>${sign}${item.result}</span></div>`;
        }).join('');
    }

    // ===== ГЕНЕРАЦИЯ КРАША =====
    function generateCrashPoint() {
        let r = Math.random();
        if (r < 0.07) return 1.00;
        let base = 1.0 / (1.0 - Math.pow(r, 1.3));
        let crash = Math.min(base, 30);
        return Math.round(crash * 100) / 100;
    }

    // ===== ВЫБОР СТАВКИ =====
    document.querySelectorAll('.bet-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            if (isPlaying) return;
            const val = this.dataset.bet;
            if (val === 'custom') {
                const custom = prompt('Введите свою сумму:', '25');
                if (custom && !isNaN(custom) && Number(custom) > 0) bet = Number(custom);
                else return;
            } else {
                bet = Number(val);
            }
            if (bet > balance) {
                statusDisplay.textContent = '❌ Недостаточно монет!';
                bet = 0;
                return;
            }
            statusDisplay.textContent = `Ставка: ${bet} монет`;
            document.querySelectorAll('.bet-btn').forEach(b => b.style.border = 'none');
            this.style.border = '2px solid #fbbf24';
        });
    });

    // ===== СТАРТ (с таймером) =====
    startBtn.addEventListener('click', function() {
        if (isPlaying || bet <= 0 || bet > balance) {
            if (bet <= 0) statusDisplay.textContent = '⚠️ Выбери ставку!';
            else if (bet > balance) statusDisplay.textContent = '❌ Недостаточно монет!';
            return;
        }

        // Блокируем ставки на время таймера и игры
        document.querySelectorAll('.bet-btn').forEach(b => b.disabled = true);
        startBtn.disabled = true;

        countdown = 5;
        timerDisplay.textContent = countdown;
        timerDisplay.classList.remove('hidden');
        statusDisplay.textContent = `⏳ Ставки принимаются ${countdown} сек`;

        timerInterval = setInterval(() => {
            countdown--;
            if (countdown <= 0) {
                clearInterval(timerInterval);
                timerInterval = null;
                timerDisplay.classList.add('hidden');
                actuallyStartGame();
            } else {
                timerDisplay.textContent = countdown;
                statusDisplay.textContent = `⏳ Ставки принимаются ${countdown} сек`;
            }
        }, 1000);
    });

    // ===== ЗАПУСК ИГРЫ =====
    function actuallyStartGame() {
        if (bet <= 0 || bet > balance) {
            statusDisplay.textContent = '⚠️ Ошибка ставки';
            return;
        }

        balance -= bet;
        updateBalanceUI();

        crashPoint = generateCrashPoint();
        if (crashPoint < 1.00) crashPoint = 1.00;

        multiplier = 1.00;
        isPlaying = true;
        isCrashed = false;
        isCashoutClicked = false;

        betSection.classList.add('hidden');
        startBtn.classList.add('hidden');
        cashoutBtn.classList.remove('hidden');
        cashoutBtn.disabled = false;
        statusDisplay.textContent = '🚀 Взлёт!';

        if (gameInterval) clearInterval(gameInterval);
        let step = 0.05;
        let delay = 200;
        gameInterval = setInterval(() => {
            multiplier += step;
            multiplier = Math.round(multiplier * 100) / 100;
            multiplierDisplay.textContent = multiplier.toFixed(2) + 'X';

            if (multiplier >= crashPoint) {
                clearInterval(gameInterval);
                gameInterval = null;
                isCrashed = true;
                isPlaying = false;
                multiplierDisplay.textContent = crashPoint.toFixed(2) + 'X';
                statusDisplay.textContent = `💥 БУМ! ${crashPoint.toFixed(2)}X — проиграл ${bet} монет`;
                addHistory('lose', bet, bet);
                cashoutBtn.classList.add('hidden');
                // Разблокируем кнопки только через 1.5 секунды
                setTimeout(() => {
                    resetGame();
                }, 1500);
                if (tg) tg.HapticFeedback?.impactOccurred('heavy');
            }
        }, delay);

        if (tg) tg.HapticFeedback?.impactOccurred('light');
    }

    // ===== СБРОС ПОСЛЕ ИГРЫ =====
    function resetGame() {
        betSection.classList.remove('hidden');
        startBtn.classList.remove('hidden');
        cashoutBtn.classList.add('hidden');
        document.querySelectorAll('.bet-btn').forEach(b => b.disabled = false);
        startBtn.disabled = false;
        document.querySelectorAll('.bet-btn').forEach(b => b.style.border = 'none');
        bet = 0;
        statusDisplay.textContent = 'Выбери ставку';
    }

    // ===== ЗАБРАТЬ (с защитой от двойного клика) =====
    cashoutBtn.addEventListener('click', function() {
        if (!isPlaying || isCrashed) return;
        if (isCashoutClicked) return; // защита от DDOS
        isCashoutClicked = true;
        this.disabled = true;

        clearInterval(gameInterval);
        gameInterval = null;
        isPlaying = false;
        const win = Math.round(bet * multiplier);
        balance += win;
        updateBalanceUI();
        statusDisplay.textContent = `🎁 Забрал ${multiplier.toFixed(2)}X! Выигрыш: ${win} монет`;
        addHistory('win', bet, win);
        cashoutBtn.classList.add('hidden');

        setTimeout(() => {
            resetGame();
        }, 1500);

        if (tg) tg.HapticFeedback?.notificationOccurred('success');
    });

    // ===== МЕНЮ =====
    document.getElementById('menuBalance').addEventListener('click', function() {
        if (tg) tg.showAlert(`💎 Твой баланс: ${balance} монет`);
        else alert(`💎 Твой баланс: ${balance} монет`);
    });
    document.getElementById('menuTop').addEventListener('click', function() {
        const msg = '🏆 Топ игроков\n\n1. Ты — ' + balance + ' монет\nОстальные пока не играли 😄';
        if (tg) tg.showAlert(msg);
        else alert(msg);
    });
    document.getElementById('menuHelp').addEventListener('click', function() {
        const msg = '❄️ Как играть:\n\n1. Выбери ставку\n2. Нажми «Старт»\n3. После 5-секундного таймера ракета взлетает\n4. Нажми «Забрать» — зафиксируй выигрыш\n5. Если ракета взорвалась — ставка проиграна\n\n⚠️ Во время таймера и полёта нельзя менять ставку.';
        if (tg) tg.showAlert(msg);
        else alert(msg);
    });

    // ===== ИНИЦИАЛИЗАЦИЯ =====
    updateBalanceUI();
    statusDisplay.textContent = 'Выбери ставку и нажми «Старт»';
    multiplierDisplay.textContent = '1.00X';
    console.log('🚀 Ракетка загружена');
</script>
</body>
</html>
