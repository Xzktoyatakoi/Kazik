<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ракетка | Киберпанк</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0515;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 16px;
            overflow: hidden;
            position: relative;
        }
        /* Киберпанк-фон с сеткой и неоном */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(120, 0, 255, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(0, 200, 255, 0.1) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 100%, rgba(255, 0, 200, 0.08) 0%, transparent 50%),
                linear-gradient(180deg, #0a0515 0%, #1a0a30 50%, #0d0520 100%);
            z-index: 0;
            pointer-events: none;
        }
        /* Сетка */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(100, 50, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(100, 50, 255, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
        }

        .app {
            position: relative;
            max-width: 420px;
            width:100%;
            background: rgba(10, 5, 30, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 24px 20px;
            border: 1px solid rgba(150, 80, 255, 0.2);
            box-shadow: 0 0 60px rgba(150, 80, 255, 0.1), inset 0 0 60px rgba(150, 80, 255, 0.03);
            z-index: 1;
            overflow: hidden;
        }
        /* Неоновая обводка */
        .app::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, #8b00ff, #00d4ff, #ff00aa, #8b00ff);
            background-size: 300% 300%;
            border-radius: 34px;
            z-index: -1;
            opacity: 0.3;
            animation: neonBorder 4s ease-in-out infinite;
        }
        @keyframes neonBorder {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; position:relative; z-index:2; }
        .logo {
            font-weight:800;
            font-size:20px;
            background: linear-gradient(135deg, #b388ff, #00d4ff, #ff00aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(150, 80, 255, 0.3);
            letter-spacing: 1px;
        }
        .balance {
            font-size:14px;
            color:#a0aec0;
            background: rgba(150, 80, 255, 0.12);
            padding:6px 16px;
            border-radius:20px;
            border:1px solid rgba(150, 80, 255, 0.15);
            backdrop-filter:blur(4px);
        }
        .balance span { color:#b388ff; font-weight:700; }

        /* Ракета с анимацией */
        .rocket-container {
            position: relative;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 4px;
            overflow: visible;
        }
        .rocket {
            font-size: 48px;
            animation: rocketFly 2s ease-in-out infinite alternate;
            filter: drop-shadow(0 0 30px rgba(150, 80, 255, 0.5));
            transform-origin: bottom center;
        }
        @keyframes rocketFly {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(-30px) scale(1.05); }
        }
        /* Огненный след */
        .rocket::after {
            content: '🔥';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            opacity: 0.7;
            animation: fireFlicker 0.3s ease-in-out infinite alternate;
        }
        @keyframes fireFlicker {
            0% { opacity: 0.5; transform: translateX(-50%) scale(0.9); }
            100% { opacity: 1; transform: translateX(-50%) scale(1.1); }
        }

        .rocket-display { text-align:center; padding:4px 0 8px; position:relative; z-index:2; }
        .multiplier {
            font-size: 60px;
            font-weight:800;
            background: linear-gradient(135deg, #b388ff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 60px rgba(150, 80, 255, 0.3);
            letter-spacing:-2px;
        }
        .multiplier-label { font-size:13px; color:rgba(150, 150, 200, 0.6); margin-top:-4px; letter-spacing:3px; text-transform:uppercase; }
        .status { font-size:15px; color:#a8a0c0; margin-top:8px; min-height:24px; font-weight:500; text-shadow:0 0 20px rgba(150,80,255,0.2); }

        .timer { font-size:36px; font-weight:700; color:#b388ff; text-align:center; margin:4px 0; text-shadow:0 0 40px rgba(150,80,255,0.4); }
        .hidden { display:none !important; }

        .bet-section {
            background: rgba(150, 80, 255, 0.06);
            border-radius:20px;
            padding:14px 12px;
            margin:8px 0;
            border:1px solid rgba(150, 80, 255, 0.1);
            backdrop-filter:blur(4px);
        }
        .bet-title { font-size:11px; color:rgba(150, 150, 200, 0.5); text-transform:uppercase; letter-spacing:2px; margin-bottom:8px; }
        .bet-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
        .bet-btn {
            background:rgba(150,80,255,0.08);
            border:1px solid rgba(150,80,255,0.12);
            border-radius:12px;
            padding:10px 4px;
            color:#c8b8e0;
            font-size:15px;
            font-weight:600;
            cursor:pointer;
            transition:all 0.2s;
        }
        .bet-btn:active { transform:scale(0.94); background:rgba(150,80,255,0.2); }
        .bet-btn.custom { background:rgba(0, 212, 255, 0.08); border-color:rgba(0, 212, 255, 0.15); color:#00d4ff; }
        .bet-btn:disabled { opacity:0.3; cursor:not-allowed; }

        .action-btn {
            width:100%;
            padding:14px;
            border:none;
            border-radius:16px;
            font-size:17px;
            font-weight:700;
            cursor:pointer;
            transition:all 0.2s;
            margin-top:6px;
            text-transform:uppercase;
            letter-spacing:1px;
        }
        .action-btn:active { transform:scale(0.96); }
        .action-btn.start {
            background: linear-gradient(135deg, #8b00ff, #b388ff);
            color:#fff;
            box-shadow:0 0 30px rgba(150,80,255,0.3);
        }
        .action-btn.start:hover { box-shadow:0 0 50px rgba(150,80,255,0.5); }
        .action-btn.cashout {
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            color:#0a0515;
            box-shadow:0 0 30px rgba(0, 212, 255, 0.3);
        }
        .action-btn:disabled { opacity:0.3; pointer-events:none; }

        .history {
            background:rgba(150,80,255,0.04);
            border-radius:16px;
            padding:10px 12px;
            margin:10px 0 4px;
            max-height:80px;
            overflow-y:auto;
            font-size:13px;
            color:#9488b0;
            border:1px solid rgba(150,80,255,0.06);
        }
        .history-item { display:flex; justify-content:space-between; padding:3px 0; border-bottom:1px solid rgba(150,80,255,0.06); }
        .history-item.win { color:#00ff88; }
        .history-item.lose { color:#ff4466; }

        .bottom-menu {
            display:flex;
            justify-content:space-around;
            margin-top:10px;
            padding-top:12px;
            border-top:1px solid rgba(150,80,255,0.08);
        }
        .menu-item {
            text-align:center;
            font-size:11px;
            color:rgba(150,150,200,0.5);
            cursor:pointer;
            transition:color 0.2s;
            background:none;
            border:none;
            padding:0;
        }
        .menu-item:hover { color:#b388ff; }
        .menu-item .icon { font-size:20px; display:block; margin-bottom:2px; }
    </style>
</head>
<body>
<div class="app" id="app">
    <div class="header">
        <div class="logo">✦ РАКЕТКА</div>
        <div class="balance">💎 <span id="balanceDisplay">200</span></div>
    </div>

    <!-- Ракета с анимацией -->
    <div class="rocket-container">
        <div class="rocket">🚀</div>
    </div>

    <div class="rocket-display">
        <div class="multiplier" id="multiplierDisplay">1.00X</div>
        <div class="multiplier-label">Множитель</div>
        <div class="status" id="statusDisplay">Выбери ставку</div>
    </div>

    <div class="timer hidden" id="timerDisplay"></div>

    <div class="bet-section" id="betSection">
        <div class="bet-title">Выбери ставку</div>
        <div class="bet-grid">
            <button class="bet-btn" data-bet="10">10</button>
            <button class="bet-btn" data-bet="50">50</button>
            <button class="bet-btn" data-bet="100">100</button>
            <button class="bet-btn" data-bet="500">500</button>
            <button class="bet-btn" data-bet="1000">1000</button>
            <button class="bet-btn custom" data-bet="custom">✏️ Своя</button>
        </div>
    </div>

    <button class="action-btn start" id="startBtn">🚀 Старт</button>
    <button class="action-btn cashout hidden" id="cashoutBtn">🎁 Забрать</button>

    <div class="history" id="historyContainer">
        <div style="color:rgba(150,150,200,0.4);font-size:11px;text-align:center;margin-bottom:4px;">История игр</div>
        <div id="historyList"></div>
    </div>

    <div class="bottom-menu">
        <button class="menu-item" id="menuBalance"><span class="icon">💎</span>Баланс</button>
        <button class="menu-item" id="menuTop"><span class="icon">🏆</span>Топ</button>
        <button class="menu-item" id="menuHelp"><span class="icon">❄️</span>Помощь</button>
    </div>
</div>

<script>
    let tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    let balance = 200;
    let bet = 0;
    let multiplier = 1.00;
    let isPlaying = false;
    let isCrashed = false;
    let crashPoint = 0;
    let gameInterval = null;
    let timerInterval = null;
    let countdown = 5;
    let gameHistory = [];
    let isCashoutClicked = false;

    const balanceDisplay = document.getElementById('balanceDisplay');
    const multiplierDisplay = document.getElementById('multiplierDisplay');
    const statusDisplay = document.getElementById('statusDisplay');
    const betSection = document.getElementById('betSection');
    const startBtn = document.getElementById('startBtn');
    const cashoutBtn = document.getElementById('cashoutBtn');
    const timerDisplay = document.getElementById('timerDisplay');
    const historyList = document.getElementById('historyList');

    function updateBalanceUI() { balanceDisplay.textContent = balance; }

    function addHistory(type, betAmount, result) {
        gameHistory.unshift({ type, bet: betAmount, result });
        if (gameHistory.length > 20) gameHistory.pop();
        renderHistory();
    }
    function renderHistory() {
        historyList.innerHTML = gameHistory.map(item => {
            const cls = item.type === 'win' ? 'win' : 'lose';
            const sign = item.type === 'win' ? '+' : '-';
            return `<div class="history-item ${cls}"><span>${item.bet} монет</span><span>${sign}${item.result}</span></div>`;
        }).join('');
    }

    function generateCrashPoint() {
        let r = Math.random();
        if (r < 0.07) return 1.00;
        let base = 1.0 / (1.0 - Math.pow(r, 1.3));
        let crash = Math.min(base, 30);
        return Math.round(crash * 100) / 100;
    }

    document.querySelectorAll('.bet-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            if (isPlaying) return;
            const val = this.dataset.bet;
            if (val === 'custom') {
                const custom = prompt('Введите свою сумму:', '25');
                if (custom && !isNaN(custom) && Number(custom) > 0) bet = Number(custom);
                else return;
            } else { bet = Number(val); }
            if (bet > balance) { statusDisplay.textContent = '❌ Недостаточно монет!'; bet = 0; return; }
            statusDisplay.textContent = `Ставка: ${bet} монет`;
            document.querySelectorAll('.bet-btn').forEach(b => b.style.border = 'none');
            this.style.border = '2px solid #b388ff';
        });
    });

    startBtn.addEventListener('click', function() {
        if (isPlaying || bet <= 0 || bet > balance) {
            if (bet <= 0) statusDisplay.textContent = '⚠️ Выбери ставку!';
            else if (bet > balance) statusDisplay.textContent = '❌ Недостаточно монет!';
            return;
        }
        document.querySelectorAll('.bet-btn').forEach(b => b.disabled = true);
        startBtn.disabled = true;
        countdown = 5;
        timerDisplay.textContent = countdown;
        timerDisplay.classList.remove('hidden');
        statusDisplay.textContent = `⏳ ${countdown} сек`;
        timerInterval = setInterval(() => {
            countdown--;
            if (countdown <= 0) {
                clearInterval(timerInterval); timerInterval = null;
                timerDisplay.classList.add('hidden');
                actuallyStartGame();
            } else {
                timerDisplay.textContent = countdown;
                statusDisplay.textContent = `⏳ ${countdown} сек`;
            }
        }, 1000);
    });

    function actuallyStartGame() {
        if (bet <= 0 || bet > balance) { statusDisplay.textContent = '⚠️ Ошибка'; return; }
        balance -= bet; updateBalanceUI();
        crashPoint = generateCrashPoint(); if (crashPoint < 1.00) crashPoint = 1.00;
        multiplier = 1.00; isPlaying = true; isCrashed = false; isCashoutClicked = false;
        betSection.classList.add('hidden'); startBtn.classList.add('hidden');
        cashoutBtn.classList.remove('hidden'); cashoutBtn.disabled = false;
        statusDisplay.textContent = '🚀 Взлёт!';
        if (gameInterval) clearInterval(gameInterval);
        gameInterval = setInterval(() => {
            multiplier += 0.05; multiplier = Math.round(multiplier * 100) / 100;
            multiplierDisplay.textContent = multiplier.toFixed(2) + 'X';
            if (multiplier >= crashPoint) {
                clearInterval(gameInterval); gameInterval = null;
                isCrashed = true; isPlaying = false;
                multiplierDisplay.textContent = crashPoint.toFixed(2) + 'X';
                statusDisplay.textContent = `💥 БУМ! ${crashPoint.toFixed(2)}X — проиграл ${bet} монет`;
                addHistory('lose', bet, bet);
                cashoutBtn.classList.add('hidden');
                setTimeout(() => resetGame(), 1500);
                if (tg) tg.HapticFeedback?.impactOccurred('heavy');
            }
        }, 200);
        if (tg) tg.HapticFeedback?.impactOccurred('light');
    }

    function resetGame() {
        betSection.classList.remove('hidden'); startBtn.classList.remove('hidden');
        cashoutBtn.classList.add('hidden');
        document.querySelectorAll('.bet-btn').forEach(b => b.disabled = false);
        startBtn.disabled = false;
        document.querySelectorAll('.bet-btn').forEach(b => b.style.border = 'none');
        bet = 0; statusDisplay.textContent = 'Выбери ставку';
    }

    cashoutBtn.addEventListener('click', function() {
        if (!isPlaying || isCrashed) return;
        if (isCashoutClicked) return;
        isCashoutClicked = true; this.disabled = true;
        clearInterval(gameInterval); gameInterval = null;
        isPlaying = false;
        const win = Math.round(bet * multiplier);
        balance += win; updateBalanceUI();
        statusDisplay.textContent = `🎁 Забрал ${multiplier.toFixed(2)}X! Выигрыш: ${win} монет`;
        addHistory('win', bet, win);
        cashoutBtn.classList.add('hidden');
        setTimeout(() => resetGame(), 1500);
        if (tg) tg.HapticFeedback?.notificationOccurred('success');
    });

    document.getElementById('menuBalance').addEventListener('click', function() {
        if (tg) tg.showAlert(`💎 Твой баланс: ${balance} монет`);
        else alert(`💎 Твой баланс: ${balance} монет`);
    });
    document.getElementById('menuTop').addEventListener('click', function() {
        const msg = '🏆 Топ игроков\n\n1. Ты — ' + balance + ' монет';
        if (tg) tg.showAlert(msg); else alert(msg);
    });
    document.getElementById('menuHelp').addEventListener('click', function() {
        const msg = '❄️ Киберпанк-ракетка:\n\n1. Выбери ставку\n2. Нажми «Старт»\n3. Таймер 5 сек\n4. Нажми «Забрать»\n5. Если взрыв — проигрыш\n\nВыигрыш = ставка × множитель';
        if (tg) tg.showAlert(msg); else alert(msg);
    });

    updateBalanceUI();
    statusDisplay.textContent = 'Выбери ставку и нажми «Старт»';
    multiplierDisplay.textContent = '1.00X';
    console.log('🚀 Киберпанк-ракетка загружена');
</script>
</body>
</html>
