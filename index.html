<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; }
        #terminal { width: 100%; height: 80vh; overflow-y: auto; white-space: pre-wrap; }
        input { background: transparent; border: none; color: #fff; width: 100%; outline: none; }
    </style>
</head>
<body>
    <div id="terminal">--- CyberRange v1.0 ---<br>> </div>
    <input type="text" id="cmdInput" autofocus>

    <script>
        const input = document.getElementById('cmdInput');
        const terminal = document.getElementById('terminal');

        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const cmd = input.value;
                terminal.innerHTML += `\n> ${cmd}\n`;
                
                const response = await fetch('http://127.0.0.1:8000/execute', {
                    method: 'POST',
                    body: JSON.stringify({cmd}),
                    headers: {'Content-Type': 'application/json'}
                });
                const data = await response.json();
                terminal.innerHTML += data.output + "\n";
                input.value = '';
                terminal.scrollTop = terminal.scrollHeight;
            }
        });
    </script>
</body>
</html>
